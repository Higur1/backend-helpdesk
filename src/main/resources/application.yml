spring:
  profiles:
    active: test
  application:
    name: helpdesk
  h2:
    console:
      enable: true
      path: /h2-console
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true