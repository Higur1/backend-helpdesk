spring:
  application:
    name: helpdesk
  jpa:
    show-sql: true
    hibernate:
      format_sql: true
---
spring:
  config:
    activate:
      on-profile: test
  h2:
    console:
      enable: true
      path: /h2-console
  datasource:
    url: ${DB_TEST_URL}
    username: ${DB_TEST_USERNAME}
    password: ${DB_TEST_PASSWORD}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.H2Dialect
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_DEV_URL}
    username: ${DB_DEV_USERNAME}
    password: ${DB_DEV_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.MySQL8Dialect
      show-sql: true